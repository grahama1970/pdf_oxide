version: 1
kind: orchestrate-plan
metadata:
  title: "Fix Quarantined PDF Extraction"
  goal: "Diagnose and fix extraction failure for a specific quarantined PDF"
  plan_type: code
  created: "2026-04-16"

# This plan is parameterized - set QUARANTINED_PDF before running
# Example: QUARANTINED_PDF=/path/to/failed.pdf /orchestrate run 17_PDF_QUARANTINE_FIX_TASKS.yaml

# Capability Overlap (Phase 0 verification)
# - /memory recall "pdf quarantine": Found defer_pdf() in extraction pipeline
# - skills-manifest.json: /debug-pdf exists for PDF analysis
# - Decision: CALL /debug-pdf for initial diagnosis
# - Decision: EXTEND extract_for_pdflab.py if new pattern needed

execution:
  max_concurrency: 1

lanes:
  - id: "diagnose"
    label: "Diagnosis"
  - id: "fix"
    label: "Fix"
  - id: "validate"
    label: "Validate"

tasks:
  # ==========================================================================
  # DIAGNOSE: Understand why extraction failed
  # ==========================================================================
  - id: "1.0"
    title: "Analyze quarantined PDF structure"
    lane: "diagnose"
    runner: "local"
    depends_on: []
    implementation:
      - "Run PyMuPDF to get PDF metadata and page count"
      - "Check for encryption, damaged pages, unusual encodings"
      - "Sample first 3 pages for text extraction test"
    definition_of_done:
      command: |
        uv run python -c "
        import fitz
        import json
        doc = fitz.open('$QUARANTINED_PDF')
        info = {
            'page_count': doc.page_count,
            'is_encrypted': doc.is_encrypted,
            'metadata': doc.metadata,
            'has_text': bool(doc[0].get_text().strip()) if doc.page_count > 0 else False
        }
        print(json.dumps(info, indent=2))
        "
      assertion: "PDF structure analyzed"

  - id: "1.1"
    title: "Attempt extraction and capture failure"
    lane: "diagnose"
    runner: "local"
    depends_on: ["1.0"]
    implementation:
      - "Run extract_for_pdflab.py with verbose output"
      - "Capture any exceptions or warnings"
      - "Run scanner to identify specific issues"
    definition_of_done:
      command: |
        uv run python -m pdf_oxide.extract_for_pdflab "$QUARANTINED_PDF" -o /tmp/quarantine-extraction.json 2>&1 | tee /tmp/extraction-log.txt && \
        uv run python -m pdf_oxide.extraction_scanner /tmp/quarantine-extraction.json --json > /tmp/quarantine-issues.json
      assertion: "Extraction attempted and issues captured"

  - id: "1.2"
    title: "Classify failure type"
    lane: "diagnose"
    runner: "scillm"
    depends_on: ["1.1"]
    implementation:
      - "Analyze extraction log and scanner output"
      - "Classify as: table_detection | encoding | layout | classification | other"
      - "Identify specific pages/blocks causing issues"
    definition_of_done:
      command: "cat /tmp/quarantine-issues.json | jq '.summary'"
      assertion: "Failure type identified"

  # ==========================================================================
  # FIX: Address the specific issue
  # ==========================================================================
  - id: "2.0"
    title: "Fix extraction for quarantined PDF"
    lane: "fix"
    runner: "code-runner"
    backend: "sonnet"
    mode: "iterative"
    depends_on: ["1.2"]
    implementation:
      - "Based on failure type from 1.2, implement fix"
      - "For table_detection: adjust find_tables() parameters or add bbox filtering"
      - "For encoding: add text normalization or encoding detection"
      - "For layout: adjust block merging or splitting logic"
      - "For classification: add pattern to classify_block()"
      - "Add test case for this specific failure pattern"
    definition_of_done:
      command: |
        uv run python -m pdf_oxide.extract_for_pdflab "$QUARANTINED_PDF" -o /tmp/quarantine-extraction.json && \
        uv run python -m pdf_oxide.extraction_scanner /tmp/quarantine-extraction.json --json | jq -e '.summary.issue_count < 5'
      assertion: "Extraction succeeds with fewer than 5 issues"

  # ==========================================================================
  # VALIDATE: Ensure fix doesn't break other PDFs
  # ==========================================================================
  - id: "3.0"
    title: "Regression test on known-good PDFs"
    lane: "validate"
    runner: "local"
    depends_on: ["2.0"]
    implementation:
      - "Run extraction on test fixture (known-good)"
      - "Verify no new issues introduced"
      - "Run unit tests"
    definition_of_done:
      command: |
        uv run pytest tests/test_extraction_classification.py -v && \
        uv run python -m pdf_oxide.extract_for_pdflab /tmp/test-fixture.pdf -o /tmp/regression-test.json && \
        uv run python -m pdf_oxide.extraction_scanner /tmp/regression-test.json --json | jq -e '.summary.issue_count == 0'
      assertion: "No regression on known-good PDFs"

  - id: "3.1"
    title: "Remove PDF from quarantine"
    lane: "validate"
    runner: "local"
    depends_on: ["3.0"]
    implementation:
      - "Move PDF from quarantine folder to processed folder"
      - "Log the fix applied for future reference"
    definition_of_done:
      command: "echo 'PDF $QUARANTINED_PDF successfully processed' >> /tmp/quarantine-resolved.log"
      assertion: "Quarantine resolved"

env:
  QUARANTINED_PDF: "${QUARANTINED_PDF:-/tmp/quarantined.pdf}"
