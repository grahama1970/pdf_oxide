name: determinism-and-fixtures
on:
  push: { branches: [main] }
  pull_request: { branches: [main] }
jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - name: Build wheel
        run: pipx run maturin build --release -o dist
      - name: Install
        run: |
          python -m venv .venv
          .venv/bin/pip install dist/*manylinux*.whl pytest
      - name: Determinism gate (S1) — runs before fixtures by design
        run: |
          # 3-run identity on the repo test PDF (fast proxy; full NASA/Ar5
          # matrix runs in the campaign harness, not CI)
          .venv/bin/python scripts/audit_slices_ci/determinism_smoke.py
      - name: Rollback fixtures
        env: { PDF_OXIDE_FIXTURE_PDF: tests/fixtures/source.pdf }
        run: .venv/bin/python -m pytest tests/test_rollback_fixtures.py -q
