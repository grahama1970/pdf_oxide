version: 1
kind: orchestrate-plan
repo_root: "/home/graham/workspace/experiments/pdf_oxide"

metadata:
  title: "PDF Profiler — Table Shapes, Structural Detail, Cloner Integration"
  goal: "Make survey_document and profile_for_cloning report table shapes, page-spanning tables, figure counts, requirements density, and running headers"
  plan_type: code
  repo_root: "/home/graham/workspace/experiments/pdf_oxide"
  created: "2026-04-07"
  primary_persona:
    name: "Graham"
    role: "pdf_oxide maintainer"
    source: "local"

execution:
  max_concurrency: 2  # table and figure tasks can run in parallel

capability_overlap:
  - "/extract-tables uses Camelot — pdf_oxide has its own Rust table detector, no overlap"
  - "/review-pdf compares extraction output — consumer of profiler, not overlap"
  - "/extract-pdf wraps pdf_oxide extraction — profiler feeds into it"
  - "survey_document() in python/pdf_oxide/survey.py already has basic profiling"
  - "profile_for_cloning() in python/pdf_oxide/clone_pdf.py wraps survey for the cloner"

questions_blockers:
  - "None"

lanes:
  - id: "0"
    label: "Phase 0: Audit current profiler gaps"
  - id: "1"
    label: "Phase 1: Table shapes + page-spanning detection"
  - id: "2"
    label: "Phase 2: Figures, requirements, headers/footers"
  - id: "3"
    label: "Phase 3: Cloner integration + regression"

tasks:
  # ── Phase 0: Audit ─────────────────────────────────────────────────

  - id: "1"
    title: "Audit current profiler output and document gaps"
    lane: "0"
    runner: "local"
    depends_on: []
    command: |
      cd /home/graham/workspace/experiments/pdf_oxide && \
      .venv/bin/python -c "
      import pdf_oxide, json
      from pdf_oxide.survey import survey_document
      doc = pdf_oxide.PdfDocument('/mnt/storage12tb/extractor_corpus/nist/nist_sp_800_171.pdf')
      survey = survey_document(doc, enrich_profile=True)
      gaps = []
      if survey.get('table_count_estimate', 0) == 0 and len(survey.get('table_pages', [])) > 0:
          gaps.append('table_count_estimate is 0 despite 43 table pages')
      if 'table_shapes' not in survey:
          gaps.append('missing table_shapes (rows x cols per table)')
      if 'page_spanning_tables' not in survey:
          gaps.append('missing page_spanning_tables detection')
      if 'figure_count' not in survey and 'figure_count_estimate' not in survey:
          gaps.append('missing figure_count')
      if 'requirements_pages' not in survey:
          gaps.append('missing requirements_pages')
      if 'running_headers' not in survey:
          gaps.append('missing running_headers detection')
      if 'running_footers' not in survey:
          gaps.append('missing running_footers detection')
      print(f'Gaps found: {len(gaps)}')
      for g in gaps:
          print(f'  - {g}')
      print(f'\\nExisting keys: {sorted(k for k in survey if not k.startswith(\"_\"))}')
      "
    definition_of_done:
      command: "echo 'audit complete'"
      assertion: "audit complete"

  # ── Phase 1: Table shapes + page-spanning ───────────────────────────

  - id: "2"
    title: "Add table shape detection (rows x cols) to survey_document"
    lane: "1"
    runner: "code-runner"
    backend: "codex"
    mode: "iterative"
    depends_on: ["1"]
    prompt: |
      In python/pdf_oxide/survey.py, improve table profiling in survey_document():

      1. Fix table_count_estimate — currently returns 0 despite detecting 43 table pages.
         The table_pages list is populated but table_count_estimate doesn't use it.

      2. Add table_shapes: for each detected table, report:
         - page number
         - estimated rows and cols (from extract_tables or line/cell analysis)
         - bbox
         - whether it has visible borders (ruled vs unruled)

      3. Add page_spanning_tables: detect consecutive table pages where the table
         likely continues. Heuristics:
         - Same column count on consecutive pages
         - No header row on the continuation page
         - Similar bbox width

      Use pdf_oxide.PdfDocument methods:
      - doc.extract_tables(page_idx) returns table objects with cells, rows, cols
      - doc.extract_spans(page_idx) returns text spans with bbox

      Output shape additions to survey result:
      ```python
      "table_count_estimate": 14,  # actual count, not 0
      "table_shapes": [
          {"page": 38, "rows": 19, "cols": 3, "bbox": [x0,y0,x1,y1], "ruled": True},
          ...
      ],
      "page_spanning_tables": [
          {"start_page": 38, "end_page": 39, "cols": 3, "reason": "same_col_count_no_header"},
          ...
      ],
      ```

      All existing tests must pass. Test with NIST SP 800-171 at
      /mnt/storage12tb/extractor_corpus/nist/nist_sp_800_171.pdf
    allowlist:
      - "python/pdf_oxide/survey.py"
    read_context:
      - "python/pdf_oxide/clone_pdf.py"
      - "src/python.rs"
    definition_of_done:
      command: "cd /home/graham/workspace/experiments/pdf_oxide && make test 2>&1 | tail -1"
      assertion: "passed"

  # ── Phase 2: Figures, requirements, headers/footers ─────────────────

  - id: "3"
    title: "Add figure count with captions to survey"
    lane: "2"
    runner: "code-runner"
    backend: "sonnet"
    mode: "iterative"
    depends_on: ["1"]
    prompt: |
      In python/pdf_oxide/survey.py, improve figure profiling:

      1. Count actual figures (not just pages with images). A figure is an image
         with a nearby caption span containing "Figure" or "Fig."

      2. Report figure_details:
         ```python
         "figure_count": 5,
         "figure_details": [
             {"page": 2, "caption": "Figure 1. System Architecture", "bbox": [...]},
         ]
         ```

      3. Add requirements_pages: pages containing requirements language.
         Detect by looking for patterns like "shall", "must", "REQ-", numbered
         clauses (3.1.1, 3.1.2, etc.) in the extracted text.
         ```python
         "requirements_pages": [18, 19, 20, 21, 22, 23, 24],
         "requirements_density": 0.09,  # fraction of total pages
         ```

      4. Add running header/footer detection by sampling pages:
         ```python
         "running_headers": ["Special Publication 800-171"],
         "running_footers": ["PAGE D-1", "APPENDIX D"],
         ```
         Detect by finding text spans that repeat across 3+ consecutive pages
         at the same y-coordinate (top 50pt for headers, bottom 50pt for footers).

      All existing tests must pass.
    allowlist:
      - "python/pdf_oxide/survey.py"
    read_context:
      - "python/pdf_oxide/clone_pdf.py"
    definition_of_done:
      command: "cd /home/graham/workspace/experiments/pdf_oxide && make test 2>&1 | tail -1"
      assertion: "passed"

  # ── Phase 3: Cloner integration ─────────────────────────────────────

  - id: "4"
    title: "Wire new profiler fields into clone_pdf profiler and sampler"
    lane: "3"
    runner: "code-runner"
    backend: "sonnet"
    mode: "iterative"
    depends_on: ["2", "3"]
    prompt: |
      In python/pdf_oxide/clone_pdf.py, update profile_for_cloning() and
      build_sampling_plan() to use the new survey fields:

      1. profile_for_cloning() should include:
         - table_shapes from survey
         - page_spanning_tables from survey
         - figure_details from survey
         - requirements_pages from survey
         - running_headers and running_footers from survey

      2. build_sampling_plan() should use:
         - page_spanning_tables to create span windows (currently uses consecutive
           table_candidate pages, which is a weaker heuristic)
         - requirements_pages to prioritize requirement-dense pages
         - table_shapes to pick pages with the largest/most complex tables
         - figure_details to sample pages with captioned figures

      3. The page signature lookup (_page_complexity) should incorporate
         table shape info — a page with a 20x5 table is more complex than
         a page with a 3x2 table.

      All existing tests must pass.
    allowlist:
      - "python/pdf_oxide/clone_pdf.py"
    read_context:
      - "python/pdf_oxide/survey.py"
    definition_of_done:
      command: "cd /home/graham/workspace/experiments/pdf_oxide && make test 2>&1 | tail -1"
      assertion: "passed"

  - id: "5"
    title: "Verify improved profiler on NIST SP 800-171"
    lane: "3"
    runner: "local"
    depends_on: ["4"]
    command: |
      cd /home/graham/workspace/experiments/pdf_oxide && \
      .venv/bin/python -c "
      from pdf_oxide.clone_pdf import profile_for_cloning, build_sampling_plan
      import json
      profile = profile_for_cloning('/mnt/storage12tb/extractor_corpus/nist/nist_sp_800_171.pdf')
      print('=== Profile ===')
      for k in ['table_count_estimate', 'table_shapes', 'page_spanning_tables', 'figure_details', 'requirements_pages', 'running_headers']:
          v = profile.get(k, 'MISSING')
          if isinstance(v, list):
              print(f'{k}: {len(v)} items')
          else:
              print(f'{k}: {v}')
      plan = build_sampling_plan('/mnt/storage12tb/extractor_corpus/nist/nist_sp_800_171.pdf', max_windows=10, seed=42)
      print(f'\\n=== Sampling Plan ===')
      for w in plan['windows']:
          print(f'{w[\"window_id\"]}: pages={w[\"source_pages\"]} {w[\"selection_reason\"][0][:50]}')
      "
    definition_of_done:
      command: "echo 'profiler verification complete'"
      assertion: "profiler verification complete"
